<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 16px; width: 320px; background: #fafafa; color: #222; }
    h1 { font-size: 14px; margin: 0 0 4px; color: #333; }
    .subtitle { font-size: 11px; color: #666; margin-bottom: 12px; line-height: 1.4; }
    label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; font-family: ui-monospace, monospace; }
    button { width: 100%; margin-top: 12px; padding: 10px; background: #0085ff; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover:not(:disabled) { background: #006fdb; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { margin-top: 12px; padding: 10px; border-radius: 4px; font-size: 12px; line-height: 1.4; }
    .status.info { background: #e8f3ff; color: #0050a0; }
    .status.success { background: #e6f7ec; color: #1c6e3d; }
    .status.error { background: #fdecec; color: #a52828; }
    .status:empty { display: none; padding: 0; margin: 0; }
  </style>
</head>
<body>
  <h1>OC Session Capture</h1>
  <div class="subtitle">Sign into OpenClinica in this browser, then paste your code below.</div>
  <label for="code">One-time code</label>
  <input type="text" id="code" placeholder="paste code from monday" autofocus>
  <button id="capture-btn">Capture &amp; Send</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
