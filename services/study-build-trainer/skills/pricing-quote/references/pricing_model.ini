[platform_discount]
rate          = 0.20
segments      = commercial
min_modules   = 3
required_core = core_edc
required_add  = insight
platform_discount_with_bundle = false

[bundle]
name           = Core Bundle
modules        = core_edc, insight
platform_discount_with_bundle = false

[modules]

[modules.core_edc]
name           = Core EDC
key            = core_edc
always_include = true
trigger        =
note           = Base EDC platform — included on all studies

[modules.insight]
name           = Insight (Analytics)
key            = insight
always_include = true
trigger        =
note           = Insight analytics platform — included on all studies

[modules.ecoa]
name           = ePRO (eCOA / Participate)
key            = ecoa
always_include = false
trigger        = epro, ecoa, patient diary, pro instrument, participate, epatient, e-pro
note           = Required when protocol includes patient diaries or PRO instruments

[modules.econsent]
name           = eConsent
key            = econsent
always_include = false
trigger        = econsent, electronic consent, electronic informed consent, e-consent
note           = Required when electronic informed consent workflow is needed

[modules.randomization]
name           = Randomization
key            = randomization
always_include = false
trigger        = randomization, randomised, randomized, treatment assignment
note           = Required when study includes randomization or treatment assignment

[study_duration]
source                   = pricing_summary
fallback_duration_months = 12
duration_field_names     = total_study_duration_months, study_duration_months, duration_months

[output]
currency_symbol = $
currency_code   = USD
price_decimals  = 2
internal_shows_contingency_detail = true
client_shows_contingency_detail   = false
client_contingency_footnote       = Includes 20%% scope contingency allowance
