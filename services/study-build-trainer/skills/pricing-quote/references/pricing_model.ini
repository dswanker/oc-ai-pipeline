# OpenClinica Pricing Model — CONFIDENTIAL
# This file is embedded in the pricing-model skill.
# Do not distribute outside of OpenClinica.
#
# RATES MANAGEMENT (Option B — baked-in rates)
# Update rates_effective_date and any rate values below when rates change,
# then re-upload this skill via the Skills API.  One person, ~5 minutes, quarterly at most.

[rates]
# Effective date of the rates in this file — shown on Internal quotes
rates_effective_date = 2026-04-22

# Professional services hourly rack rate (USD)
ps_hourly_rate = 275.00

# Minutes of effort per flagged item (60 = 1 hour)
minutes_per_flagged_item = 60

# Contingency percentage applied to (base build + PM hours)
contingency_pct = 0.20

# Fixed project management hours added to every quote (one-time)
project_management_hours = 40

[flag_categories]
SITE_SPECIFIC         = true
OID_CONFIRMATION      = true
PROTOCOL_AMBIGUOUS    = true
CONSTRAINT_REVIEW     = true
CUSTOM_DOMAIN         = true
PDF_MAPPING_UNCERTAIN = true
NAME_DEVIATION        = true
CHOICE_LIST_REVIEW    = false

[rounding]
base_hours_rounding        = nearest
contingency_hours_rounding = nearest

[subscription_list_prices]
# Monthly list prices per segment.
# Update values + rates_effective_date above when pricing changes.
# Format: module.segment = monthly_price
# COMMERCIAL
core_edc.commercial     = 2600.00
ecoa.commercial         = 1400.00
econsent.commercial     = 1100.00
insight.commercial      = 750.00
randomization.commercial = 750.00
core_bundle.commercial  = 3000.00

# ACADEMIC / NON-PROFIT
core_edc.academic       = 1100.00
ecoa.academic           = 900.00
econsent.academic       = 800.00
insight.academic        = 400.00
randomization.academic  = 500.00
core_bundle.academic    = 1250.00

# LOW-MARKET (startups/emerging, pre-revenue or <$25M revenue)
core_edc.low_market     = 1300.00
ecoa.low_market         = 900.00
econsent.low_market     = 800.00
insight.low_market      = 400.00
randomization.low_market = 500.00
core_bundle.low_market  = 1500.00

